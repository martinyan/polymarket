server {
    listen 80;
    root /usr/share/nginx/html;
    index weather_analysis.html;

    # No caching for HTML — always fetch latest from server
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ =404;
    }

    # Static assets (charts.js CDN fetched by browser, not us) — default
    location / {
        try_files $uri $uri/ =404;
    }
}
