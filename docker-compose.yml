services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clean-polymarket-copy-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  weather-ui:
    image: nginx:alpine
    container_name: polymarket-weather-ui
    restart: unless-stopped
    ports:
      - "9000:80"
    volumes:
      - ./data:/usr/share/nginx/html:ro

  weather-updater:
    image: node:20-bookworm-slim
    container_name: polymarket-weather-updater
    restart: unless-stopped
    working_dir: /app
    # Every hour:
    #   1. Regenerate the visual dashboard (weather_analysis.html)
    #   2. Log any new BUY signals to forward_test_log.csv
    #   3. Resolve any past trades that have settled
    entrypoint: >
      sh -c "npm ci --silent &&
             while true; do
               echo \"[$(date -u '+%H:%M:%S UTC')] --- hourly run ---\";
               node_modules/.bin/tsx src/weather/visualize.ts --city all --days 7 2>&1;
               node_modules/.bin/tsx src/weather/forwardtest.ts all --city all 2>&1;
               echo \"[$(date -u '+%H:%M:%S UTC')] Done. Sleeping 60 min.\";
               sleep 3600;
             done"
    volumes:
      - .:/app
